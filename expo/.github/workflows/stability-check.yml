name: Stability Check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: expo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run handoff validation
        run: node scripts/validate-handoff.js

      - name: Run repository health check
        run: node scripts/repo-health-check.js

      - name: Run production preflight
        run: node scripts/production-preflight.js
